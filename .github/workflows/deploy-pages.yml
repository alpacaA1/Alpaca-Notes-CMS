name: Deploy Hexo site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout private content repository
        uses: actions/checkout@v4
        with:
          repository: alpacaA1/Alpaca-Notes-Content
          ssh-key: ${{ secrets.PRIVATE_CONTENTS_DEPLOY_KEY }}
          path: private-content
          sparse-checkout: |
            source/_posts
            source/images

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run admin tests
        run: npm test --workspace admin-app

      - name: Run private content sync tests
        run: npm run test:sync-private-content

      - name: Run site page tests
        run: npm run test:today-knowledge

      - name: Build Hexo site
        run: npm run build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
