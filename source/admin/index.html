<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Alpaca Notes Admin</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #alpaca-admin-loading {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8fafc;
        color: #475569;
        font-size: 14px;
        letter-spacing: 0.02em;
      }

      .alpaca-entry-summary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .alpaca-status-badge {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 10px;
        font-size: 12px;
        font-weight: 600;
        line-height: 20px;
      }

      .alpaca-status-badge.is-published {
        background: #dcfce7;
        color: #166534;
      }

      .alpaca-status-badge.is-draft {
        background: #fef3c7;
        color: #92400e;
      }

      .alpaca-published-lock {
        margin-top: 8px;
        color: #92400e;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div id="alpaca-admin-loading">正在加载在线编辑后台…</div>

    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      (function () {
        const { CMS, initCMS } = window;
        if (!CMS || !initCMS) {
          return;
        }

        const LOCK_PREFIX = 'alpaca-admin-published-lock:';
        const STATUS_SEPARATOR = '|||';

        const currentHash = () => location.hash || '#/';
        const lockKey = () => `${LOCK_PREFIX}${currentHash()}`;
        const isNewEntry = () => /#\/collections\/[^/]+\/new/.test(currentHash());

        const getLeafSummaryNodes = () =>
          Array.from(document.querySelectorAll('span, div, a, li, p, h1, h2, h3, h4')).filter(
            (element) => element.children.length === 0 && element.textContent.includes(STATUS_SEPARATOR)
          );

        const decorateEntryStatus = () => {
          getLeafSummaryNodes().forEach((element) => {
            if (element.dataset.alpacaStatusDecorated === 'true') {
              return;
            }

            const text = element.textContent.trim();
            const parts = text.split(STATUS_SEPARATOR);
            if (parts.length < 3) {
              return;
            }

            const [title, publishedValue, ...metaParts] = parts;
            const meta = metaParts.join(STATUS_SEPARATOR);
            const wrapper = document.createElement('span');
            wrapper.className = 'alpaca-entry-summary';

            const badge = document.createElement('span');
            badge.className = `alpaca-status-badge ${publishedValue === 'true' ? 'is-published' : 'is-draft'}`;
            badge.textContent = publishedValue === 'true' ? '已发布' : '草稿';

            const titleNode = document.createElement('span');
            titleNode.textContent = title.trim();

            wrapper.appendChild(badge);
            wrapper.appendChild(titleNode);

            if (meta.trim()) {
              const metaNode = document.createElement('span');
              metaNode.textContent = meta.trim();
              wrapper.appendChild(metaNode);
            }

            element.textContent = '';
            element.appendChild(wrapper);
            element.dataset.alpacaStatusDecorated = 'true';
          });
        };

        const getPublishedInput = () => {
          return Array.from(document.querySelectorAll('input[type="checkbox"]')).find((input) => {
            const fieldText =
              input.closest('label')?.textContent ||
              input.parentElement?.textContent ||
              input.closest('[role="group"]')?.textContent ||
              '';

            return fieldText.includes('已发布');
          });
        };

        const mountPublishedLockHint = (input, locked) => {
          const host = input.closest('label')?.parentElement || input.parentElement;
          if (!host) {
            return;
          }

          let hint = host.querySelector('.alpaca-published-lock');
          if (!locked) {
            if (hint) {
              hint.remove();
            }
            return;
          }

          if (!hint) {
            hint = document.createElement('div');
            hint.className = 'alpaca-published-lock';
            hint.textContent = '这篇文章已经发布，之后只能继续保持已发布状态。';
            host.appendChild(hint);
          }
        };

        const syncPublishedLock = () => {
          const input = getPublishedInput();
          if (!input) {
            return;
          }

          if (sessionStorage.getItem(lockKey()) === null) {
            sessionStorage.setItem(lockKey(), input.checked ? 'true' : 'false');
          }

          const locked = sessionStorage.getItem(lockKey()) === 'true';
          input.disabled = locked;
          if (locked) {
            input.checked = true;
          }
          mountPublishedLockHint(input, locked);
        };

        const hideLoading = () => {
          const loading = document.getElementById('alpaca-admin-loading');
          if (loading) {
            loading.style.display = 'none';
          }
        };

        const ensurePermalinkForNewEntry = (entry) => {
          if (!isNewEntry()) {
            return;
          }

          const permalink = entry.getIn(['data', 'permalink']);
          if (typeof permalink !== 'string' || permalink.trim() === '') {
            throw new Error('新建文章首次保存前需要填写 permalink。');
          }
        };

        CMS.registerEventListener({
          name: 'preSave',
          handler: ({ entry }) => {
            ensurePermalinkForNewEntry(entry);

            if (sessionStorage.getItem(lockKey()) === 'true' && entry.getIn(['data', 'published']) === false) {
              throw new Error('已发布文章不能改回草稿。');
            }

            if (entry.getIn(['data', 'published']) === undefined) {
              return entry.get('data').set('published', true);
            }

            return entry.get('data');
          },
        });

        CMS.registerEventListener({
          name: 'postSave',
          handler: () => {
            const input = getPublishedInput();
            if (input?.checked) {
              sessionStorage.setItem(lockKey(), 'true');
            }

            syncPublishedLock();
            decorateEntryStatus();
          },
        });

        const observer = new MutationObserver(() => {
          decorateEntryStatus();
          syncPublishedLock();
          hideLoading();
        });

        observer.observe(document.body, { childList: true, subtree: true });
        window.addEventListener('hashchange', () => {
          setTimeout(() => {
            decorateEntryStatus();
            syncPublishedLock();
          }, 0);
        });

        initCMS();
      })();
    </script>
  </body>
</html>
